version: '3.8'
name: n8n_evolution

networks:
  backend_net:
    external: true      # <— importante
    name: backend_net   # <— mismo nombre que en el otro compose

services:
  n8n:
    stdin_open: true
    tty: true
    container_name: n8n
    image: docker.n8n.io/n8nio/n8n
    ports:
      - "5678:5678"
    volumes:
      - ./n8n_data:/home/node/.n8n
    environment:
      - N8N_SECURE_COOKIE=false
      - GENERIC_TIMEZONE=America/Guayaquil
      - TZ=America/Guayaquil
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
      - WEBHOOK_URL=https://${N8N_HOST}
      - N8N_PROXY_HOPS=1 
      - DB_SQLITE_POOL_SIZE=5
      - N8N_RUNNERS_ENABLED=true

    networks: [backend_net]   # <— conéctalo a la red

  evolutionapi:
    container_name: evolutionapi
    image: atendai/evolution-api:v2.1.1
    restart: always
    ports:
      - "8080:8080"
    environment:
      - AUTHENTICATION_API_KEY=${AUTHENTICATION_API_KEY}

      # Si Evolution usará **Postgres** a través de PgBouncer:
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${DB_USERNAME}:${DB_PASSWORD}@pgbouncer:6432/${DB_NAME}
      - CONFIG_SESSION_PHONE_VERSION=${CONFIG_SESSION_PHONE_VERSION}
      # (Alternativa: directo a Postgres sin PgBouncer)
      # - DATABASE_CONNECTION_URI=postgresql://${DB_USERNAME}:${DB_PASSWORD}@merp-db:5432/${DB_NAME}

      # Redis de tu infra:
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis-sarha:6379
      - CACHE_REDIS_PREFIX_KEY=evo
      - CACHE_REDIS_SAVE_INSTANCES=true

      # Cache local opcional
      - CACHE_LOCAL_ENABLED=true
    volumes:
      - ./evolution_api:/evolution/instances
    networks: [backend_net]   # <— conéctalo a la red
